<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">App category cover</title>
  <desc id="desc">Dark editorial cover with mobile screens, interaction paths, and app interface states.</desc>
  <defs>
