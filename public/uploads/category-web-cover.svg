<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Web category cover</title>
  <desc id="desc">Dark editorial cover with responsive website wireframes, browser chrome, and interface grids.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#070304"/>
      <stop offset="0.52" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#151124"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <g fill="#070304" fill-opacity="0.82" stroke="#6db7ff" stroke-width="2">
    <rect x="190" y="188" width="780" height="520" rx="18"/>
    <rect x="1048" y="288" width="286" height="520" rx="28"/>
  </g>
  <g fill="#6db7ff" fill-opacity="0.9">
    <circle cx="240" cy="236" r="8"/>
    <circle cx="270" cy="236" r="8"/>
    <circle cx="300" cy="236" r="8"/>
  </g>
  <g stroke="#ff4401" stroke-width="2" fill="none">
    <rect x="254" y="310" width="306" height="260" rx="12"/>
    <rect x="598" y="310" width="300" height="86" rx="12"/>
    <rect x="598" y="428" width="300" height="142" rx="12"/>
    <rect x="1094" y="362" width="194" height="88" rx="12"/>
    <rect x="1094" y="484" width="194" height="164" rx="12"/>
  </g>
  <g fill="#f5ede8" font-family="Inter, Arial, sans-serif">
    <text x="254" y="792" font-size="30" font-weight="800" fill-opacity="0.68">RESPONSIVE / WEB UI / SYSTEM</text>
    <text x="254" y="866" font-size="96" font-weight="900">WEB</text>
    <text x="1136" y="742" font-size="106" font-weight="900" fill="#6db7ff">03</text>
  </g>
  <g stroke="#f5ede8" stroke-opacity="0.22" stroke-width="2">
    <path d="M188 764H970"/>
    <path d="M1048 708H1334"/>
    <path d="M1050 254H1334"/>
  </g>
</svg>
